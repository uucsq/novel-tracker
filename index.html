<!DOCTYPE html>

<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>小说记录</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 5px; }
    .book { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<h1>📚 我的小说记录</h1>

<input id="name" placeholder="小说名称">
<select id="status">
  <option value="未读">未读</option>
  <option value="在读">在读</option>
  <option value="已读">已读</option>
</select>
<button onclick="addBook()">添加</button>

<h2>📕 未读</h2>
<div id="todo"></div>

<h2>📖 在读</h2>
<div id="doing"></div>

<h2>✅ 已读</h2>
<div id="done"></div>


<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

function save() {
  localStorage.setItem("books", JSON.stringify(books));
}

function render() {
  const todo = document.getElementById("todo");
  const doing = document.getElementById("doing");
  const done = document.getElementById("done");

  todo.innerHTML = "";
  doing.innerHTML = "";
  done.innerHTML = "";

  books.forEach((book, index) => {
   const item = `

  <div class="book">
    <b>${book.name}</b>
    <button onclick="removeBook(${index})">删除</button>
  </div>
`;


  if (book.status === "未读") {
    todo.innerHTML += item;
  } else if (book.status === "在读") {
    doing.innerHTML += item;
  } else {
    done.innerHTML += item;
}

});
}


function addBook() {
  const name = document.getElementById("name").value;
  const status = document.getElementById("status").value;
  if (!name) return;

  books.push({ name, status });
  save();
  render();
  document.getElementById("name").value = "";
}

function removeBook(index) {
  books.splice(index, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
